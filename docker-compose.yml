services:
  back:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: matcha_back
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./api/src:/app/src
    depends_on:
      - db
    restart: always
    networks:
      - matcha_network

  front:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: matcha_front
    env_file: .env
    ##########
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/src
    ##########
    depends_on:
      - back
    networks:
      - matcha_network

  db:
    image: postgres:16
    hostname: db
    container_name: matcha_db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - matcha_network
    # restart: always
    user: "${UID}:${GID}"

  nginx:
    image: nginx:alpine
    container_name: matcha_nginx
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx:/etc/nginx
    ports:
      - "8080:80"
    # ports:
      # - 4443:443
    depends_on:
      - front
      - back
    networks:
     - matcha_network

volumes:
  postgres_data:

networks:
  matcha_network:
    driver: bridge
